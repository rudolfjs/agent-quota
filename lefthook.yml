pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.go"
      run: >
        sh -c 'if [ "$#" -eq 0 ]; then exit 0; fi;
        files=$(gofmt -l "$@");
        if [ -n "$files" ]; then printf "%s\n" "$files"; exit 1; fi' sh {staged_files}
    vet:
      glob: "*.go"
      run: go vet ./...
    lint:
      glob: "*.go"
      run: golangci-lint run ./...

commit-msg:
  commands:
    conventional:
      run: >
        head -1 {1} | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'
        || (echo "Commit message must follow Conventional Commits" && exit 1)

pre-push:
  parallel: true
  commands:
    test:
      run: go test -race -count=1 ./...
    build:
      run: go build -o /dev/null ./cmd/agent-quota/
