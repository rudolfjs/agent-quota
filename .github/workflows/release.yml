name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    if: "!endsWith(github.actor, '[bot]')"

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Verify tag points to a commit on main
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Release tags must point to commits already on main."
            exit 1
          fi

      - name: Detect changelog state
        id: changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          if [ -f ".changes/${version}.md" ]; then
            echo "mode=existing" >> "$GITHUB_OUTPUT"
            echo "Release notes already exist at .changes/${version}.md"
          elif [ -n "$(ls .changes/unreleased/ 2>/dev/null | grep -v .gitkeep)" ]; then
            echo "mode=batch" >> "$GITHUB_OUTPUT"
            echo "Unreleased fragments found — will batch"
          else
            echo "::error::No release notes and no unreleased changelog entries. Nothing to release."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release verification checks
        run: |
          sh -n scripts/install.sh
          go test -race -count=1 ./...
          go build -o /tmp/agent-quota ./cmd/agent-quota/

      - name: Install changie
        if: steps.changelog.outputs.mode == 'batch'
        uses: miniscruff/changie-action@v3
        with:
          version: latest

      - name: Batch and merge changelog
        if: steps.changelog.outputs.mode == 'batch'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          changie batch "$version"
          changie merge

      - name: Commit changelog updates
        if: steps.changelog.outputs.mode == 'batch'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changes/ CHANGELOG.md
          git commit -m "chore: update changelog for ${TAG}"
          git push origin HEAD:main

      - name: Move tag to include changelog commit
        if: steps.changelog.outputs.mode == 'batch'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git tag -f "$TAG"
          git push origin "$TAG" --force

  build:
    name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
    runs-on: ubuntu-latest
    needs: release
    if: "!endsWith(github.actor, '[bot]')"
    strategy:
      fail-fast: true
      matrix:
        target:
          - { goos: linux, goarch: amd64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }

    steps:
      - name: Check out code at updated tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          TAG: ${{ github.ref_name }}
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          set -eu

          version="${TAG#v}"
          short_commit=$(git rev-parse --short HEAD)
          name="agent-quota_${version}_${GOOS}_${GOARCH}"
          package_dir="dist/${name}"

          mkdir -p "$package_dir"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X github.com/rudolfjs/agent-quota/internal/version.buildVersion=${TAG} -X github.com/rudolfjs/agent-quota/internal/version.buildCommit=${short_commit}" \
            -o "${package_dir}/agent-quota" \
            ./cmd/agent-quota/

          cp LICENSE "${package_dir}/"
          cp README.md "${package_dir}/"

          tar -C dist -czf "dist/${name}.tar.gz" "${name}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: "!endsWith(github.actor, '[bot]')"

    steps:
      - name: Check out code at updated tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download all tarball artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tarball-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Prepare release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          cp ".changes/${version}.md" release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            scripts/install.sh
