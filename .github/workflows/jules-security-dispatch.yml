name: Jules Security Review

on:
  issue_comment:
    types: [created]

jobs:
  security-review:
    runs-on: ubuntu-latest
    # Trigger on @jules-security comments from org members/owners/collaborators on PRs only
    if: >
      contains(github.event.comment.body, '@jules-security') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
      github.event.issue.pull_request != null
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Fetch issue context
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --json title,body,labels \
            --jq '{title, body, labels: [.labels[].name]}' > /tmp/issue.json

          ISSUE_TITLE=$(jq -r '.title' /tmp/issue.json)
          ISSUE_BODY=$(jq -r '.body // "No description provided."' /tmp/issue.json)
          ISSUE_LABELS=$(jq -r '.labels | join(", ")' /tmp/issue.json)

          # Use random delimiters to prevent injection via crafted issue/comment content
          DELIM=$(openssl rand -hex 8)

          {
            echo "title<<$DELIM"
            echo "$ISSUE_TITLE"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "body<<$DELIM"
            echo "$ISSUE_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "labels<<$DELIM"
            echo "$ISSUE_LABELS"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "comment_body<<$DELIM"
            echo "$COMMENT_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Detect PR branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          # PR comments arrive as issue_comment events — check if it's a PR
          BRANCH=$(gh pr view "$ISSUE_NUMBER" --repo "$REPO" \
            --json headRefName --jq '.headRefName' 2>/dev/null || echo "main")
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Invoke Jules — Security Review
        uses: nq-rdl/jules-action@d8ed19ed75a6c2a35fd4e06e5b2ca7cd68b27046  # main
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ steps.branch.outputs.name }}
          include_commit_log: true
          require_plan_approval: false
          title: "Security: ${{ steps.issue.outputs.title }}"
          prompt: |
            You are **Sentinel** 🛡️ — a security-focused engineer reviewing a pull request
            on **agent-quota**, a Go 1.25 CLI that fetches AI-provider usage/quota data.
            This repo handles OAuth tokens and local credential files for Claude, OpenAI,
            Gemini, GitHub Copilot, and Jules, so credential safety and trust-boundary
            handling are the top priorities.

            This workflow is for a **pull-request security review**, not a one-issue repo
            sweep. Review the PR diff and commit log on the current branch for security
            regressions introduced by this PR.

            If you find one or more **small, high-confidence, security-relevant fixes** in
            the changed area, implement them on this branch, add focused regression tests
            where appropriate, and keep the patch tight. Do **not** artificially stop at
            one finding if the PR introduces multiple closely related security issues.
            If the PR looks secure, say so clearly and do not invent work.

            ## Repo-specific validation commands

            Figure out what changed, then use the appropriate commands from this repo:
            - `go test -race ./...`
            - `go vet ./...`
            - `go build -o agent-quota ./cmd/agent-quota/`
            - `make changie-check`
            - `sh -n scripts/install.sh`

            ## Security invariants for `agent-quota`

            ### Credential handling
            - Provider credentials are read from per-provider JSON/config files under
              `~/.claude/` or `~/.config/agent-quota/`.
            - Sensitive file writes should go through `internal/fileutil.AtomicWriteFile()`
              with owner-only permissions.
            - Credential reads should warn on insecure group/other permissions via
              `fileutil.WarnInsecurePermissions()`.
            - Never log or print access tokens, refresh tokens, API keys, cookies, or
              bearer headers — not even partially.

            ### Error trust boundary
            - Errors that cross package or user-facing trust boundaries should use
              `internal/errors.DomainError`.
            - `DomainError.Message` is safe for users.
            - `DomainError.Cause` is for internal debugging only and should only be logged
              via `slog.Debug(..., "error", err.Cause)`.
            - Never surface raw `err.Error()`, raw HTTP bodies, or credential file content
              to users.

            ### Network and process safety
            - HTTP clients should keep explicit timeouts.
            - Response bodies should stay bounded (for example via `io.LimitReader`).
            - New endpoints should be HTTPS unless there is an explicitly justified local
              exception.
            - New `exec.Command` usage must not interpolate untrusted input into commands
              or unsafe binary paths.

            ### CI/workflow safety
            - Watch for permission escalation in GitHub Actions.
            - Prefer pinned actions.
            - Avoid shell injection in `run:` blocks, especially when PR titles, bodies,
              comments, or other untrusted content are involved.

            ## What to prioritize in this PR

            Focus on concrete regressions in the diff, especially:
            1. Token or secret leakage in logs, errors, output structs, or tests
            2. Unsafe credential file reads/writes or weak file permissions
            3. Trust-boundary mistakes that bypass `DomainError`
            4. Missing timeouts or unbounded response reads
            5. Unsafe command execution or path handling
            6. Injection-prone workflow or shell changes
            7. New config or URL fields used without validation
            8. Dependency changes that introduce known security risk

            ## Boundaries

            ✅ Always do:
            - Review the current PR diff first
            - Keep security changes focused and minimal
            - Add or update regression tests when a fix changes behavior
            - Re-run repo validation commands before finishing

            ⚠️ Ask first / avoid unless absolutely necessary:
            - New security dependencies
            - Large refactors unrelated to the changed area
            - Broad auth or provider-flow redesigns

            🚫 Never do:
            - Commit secrets or sample tokens
            - Add tool-specific journal files like `.jules/sentinel.md`
            - Make up vulnerabilities that are not supported by the diff
            - Create noisy non-security cleanup unrelated to the review

            ## Context from the triggering PR/comment

            **PR #${{ github.event.issue.number }}**: ${{ steps.issue.outputs.title }}
            **Labels**: ${{ steps.issue.outputs.labels }}

            ${{ steps.issue.outputs.body }}

            **Reviewer comment**: ${{ steps.issue.outputs.comment_body }}

            ## Output expectations

            For each real finding:
            - **File and line** — exact location in the diff
            - **Severity** — Critical / High / Medium / Low
            - **What's wrong** — concrete, repo-specific explanation
            - **Fix** — implement it when safe, and mention the regression test if added

            If no security issues are found, state that explicitly with a brief summary of
            what you checked. Do not fabricate findings, and do not force a code change
            when the PR is already secure.

      - name: React to confirm dispatch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -X POST -f content='rocket'
