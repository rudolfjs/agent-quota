name: Jules Security Review

on:
  issue_comment:
    types: [created]

jobs:
  security-review:
    runs-on: ubuntu-latest
    # Trigger on @jules-security comments from org members/owners/collaborators on PRs only
    if: >
      contains(github.event.comment.body, '@jules-security') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
      github.event.issue.pull_request != null
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Fetch issue context
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --json title,body,labels \
            --jq '{title, body, labels: [.labels[].name]}' > /tmp/issue.json

          ISSUE_TITLE=$(jq -r '.title' /tmp/issue.json)
          ISSUE_BODY=$(jq -r '.body // "No description provided."' /tmp/issue.json)
          ISSUE_LABELS=$(jq -r '.labels | join(", ")' /tmp/issue.json)

          # Use random delimiters to prevent injection via crafted issue/comment content
          DELIM=$(openssl rand -hex 8)

          {
            echo "title<<$DELIM"
            echo "$ISSUE_TITLE"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "body<<$DELIM"
            echo "$ISSUE_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "labels<<$DELIM"
            echo "$ISSUE_LABELS"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

          {
            echo "comment_body<<$DELIM"
            echo "$COMMENT_BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Detect PR branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          # issue_comment on a PR — fetch the PR's head branch
          BRANCH=$(gh pr view "$ISSUE_NUMBER" --repo "$REPO" \
            --json headRefName --jq '.headRefName' 2>/dev/null || echo "main")
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Invoke Jules — Security Review
        uses: nq-rdl/jules-action@d8ed19ed75a6c2a35fd4e06e5b2ca7cd68b27046  # main
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ steps.branch.outputs.name }}
          include_commit_log: true
          require_plan_approval: false
          title: "Security: ${{ steps.issue.outputs.title }}"
          prompt: |
            You are a Security Engineer reviewing a pull request on **agent-quota**, a Go
            CLI that fetches AI-provider usage quotas. It handles OAuth tokens for Claude,
            OpenAI, Gemini, GitHub Copilot, and Jules — making credential safety the top
            priority. Review the PR diff and commit log on this branch for security
            regressions, then open a fix PR or document findings.

            ## How this codebase handles security today

            Understanding these invariants helps you spot regressions:

            ### Credential lifecycle
            - Tokens are read from per-provider JSON files under ~/.claude/ or ~/.config/agent-quota/
              using helpers in each internal/<provider>/ package.
            - Every credential read calls `fileutil.WarnInsecurePermissions()` to flag
              group/world-readable files (0o044 check).
            - All credential and config writes use `fileutil.AtomicWriteFile()` — temp file
              with 0o600 permissions, then atomic rename. No partial writes on crash.
            - Claude provider refreshes tokens by exec'ing the `claude` CLI binary
              (resolved via AGENT_QUOTA_CLAUDE_PATH env var or PATH lookup).
            - OpenAI and Gemini refresh via POST to their OAuth endpoints with hardcoded
              client IDs/secrets (documented as non-confidential for native apps).
            - Environment variables (JULES_API_KEY, COPILOT_GITHUB_TOKEN, GH_TOKEN,
              GITHUB_TOKEN) are checked before config files for some providers.

            ### Error handling boundary
            - All provider errors are wrapped in `internal/errors.DomainError` before
              reaching the user. `DomainError.Message` is safe for display;
              `DomainError.Cause` holds the raw error and is only logged at slog.Debug.
            - Existing `security_test.go` files verify that credentials never appear in
              QuotaResult JSON and that all error paths return DomainError.

            ### HTTP client hardening
            - Every provider uses `&http.Client{Timeout: 30 * time.Second}`.
            - All response bodies are read through `io.LimitReader(resp.Body, 1<<20)`
              (1 MiB cap).
            - Only HTTPS endpoints are used (api.anthropic.com, chatgpt.com,
              cloudcode-pa.googleapis.com, api.github.com, jules.googleapis.com).

            ### File layout you should know
            | Path | Security relevance |
            |---|---|
            | internal/<provider>/ | Token read, refresh, API call, error wrapping |
            | internal/errors/errors.go | DomainError — the trust boundary |
            | internal/fileutil/ | Atomic writes (0o600), permission checks |
            | internal/config/ | Config/settings/cache — all 0o700 dirs, 0o600 files |
            | cmd/agent-quota/main.go | CLI flags, provider wiring, output mode |
            | .github/workflows/ | CI, release, this security workflow |

            ## What to look for in the PR diff

            Focus on changes that could **break the invariants above**:

            1. **Token leakage** — Any new logging (slog, fmt), error message, or JSON
               serialization path that could expose an access token or API key. Tokens
               must never appear in slog output, stderr, or QuotaResult fields.
            2. **Credential file safety** — New file reads/writes must use
               `fileutil.AtomicWriteFile()` and `fileutil.WarnInsecurePermissions()`.
               Watch for raw `os.WriteFile` or `os.Create` on credential paths.
            3. **Error boundary bypass** — New error returns in provider code that skip
               DomainError wrapping, exposing raw HTTP bodies or file paths to the user.
            4. **HTTP client changes** — Removed timeouts, missing LimitReader, new
               endpoints using HTTP instead of HTTPS, or custom TLS configs that weaken
               validation.
            5. **External process execution** — New `exec.Command` calls (like the Claude
               refresh binary). Check that arguments are not constructed from user input
               and that binary paths cannot be hijacked.
            6. **Dependency changes** — New or updated deps in go.mod/go.sum. Check for
               known CVEs, verify the module is well-maintained, and flag any new
               transitive deps that handle crypto or networking.
            7. **CI/CD and workflow changes** — New secrets usage, permission escalation,
               unpinned action versions, or injection-prone `run:` blocks that
               interpolate issue/PR content without environment variable indirection.
            8. **Config parsing** — New config fields that could be abused (e.g., a URL
               field that gets used in an HTTP request without validation).

            ## Context from the triggering issue/PR

            **Issue #${{ github.event.issue.number }}**: ${{ steps.issue.outputs.title }}
            **Labels**: ${{ steps.issue.outputs.labels }}

            ${{ steps.issue.outputs.body }}

            **Reviewer comment**: ${{ steps.issue.outputs.comment_body }}

            ## Output expectations

            For each finding:
            - **File and line** — exact location in the diff
            - **Severity** — Critical / High / Medium / Low
            - **What's wrong** — concrete description, not generic advice
            - **Fix** — implement the fix if safe to automate, or provide a clear
              code snippet showing the remediation

            If no security issues are found, state that explicitly with a brief summary
            of what you checked. Do not fabricate findings.

      - name: React to confirm dispatch
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            -X POST -f content='rocket'
