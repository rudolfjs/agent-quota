kind: Added
body: Added 'agent-quota self-update' (aka 'aq self-update') which downloads the latest GitHub release, verifies the sha256 checksum, and atomically swaps the running binary. Supports --check (report only), --force (reinstall same version), and --pre (include prereleases). Linux/amd64 only.
